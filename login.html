<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Assets Management System - Login</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom styling to ensure the background/fonts match the screenshots -->
    <style>
        body {
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
            background-color: #334155; /* Match the dark gray background in devtools wrapper */
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-0 sm:p-4 md:p-8">

    <!-- Main Container -->
    <div class="w-full max-w-[1200px] aspect-[16/10] bg-white shadow-2xl flex flex-col sm:flex-row overflow-hidden rounded-lg">
        
        <!-- Left Side: Login Form (100% width on mobile, 50% on large screens) -->
        <div class="w-full lg:w-1/2 flex flex-col justify-between p-8 md:p-12 lg:p-16 h-full min-h-[500px]">
            
            <!-- Top: Logo Section -->
            <div class="flex items-center space-x-1">
                <!-- ESU Logo Simulation -->
                <span class="text-[#800000] text-4xl font-extrabold tracking-tight">NY</span>
                <div class="relative inline-block">
                    <span class="text-[#800000] text-4xl font-extrabold">C</span>
                    
                </div>
            </div>

            <!-- Middle: Main Content -->
            <div class="my-auto space-y-6 py-8">
                <h1 class="text-3xl md:text-4xl lg:text-5xl font-semibold text-[#1E3A8A] leading-tight">
                    IT Assets <br class="hidden sm:inline" />
                    Management <br class="hidden sm:inline" />
                    System
                </h1>
                
                <h2 class="text-xl md:text-2xl font-bold text-gray-700 mt-8">
                    Login t System
                </h2>

                <!-- Microsoft Sign-In Button -->
                <button class="w-full max-w-sm flex items-center justify-center space-x-3 border border-gray-300 rounded px-4 py-2.5 hover:bg-gray-50 transition duration-150 ease-in-out shadow-sm mt-4 bg-white">
                    <!-- Microsoft Logo SVG -->
                    <svg class="h-5 w-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
                    </svg>
                    <span class="text-gray-700 font-semibold text-sm">Sign in</span>
                </button>
            </div>

            <!-- Bottom: Support Footer -->
            <div class="text-xs text-gray-500 border-t border-gray-100 pt-4 mt-auto">
                Having trouble logging in? call to 
                <a href="tel:0117677655" class="text-[#004B87] font-bold hover:underline">IT Division</a> 
                for assistance!
            </div>
        </div>

        <!-- Right Side: Image Column (Hidden on mobile/tablet, visible on 'lg' and larger screens) -->
        <div class="hidden lg:flex lg:w-1/2 bg-gray-100 relative overflow-hidden">
            <!-- Simulated Graduation Image (Replace src with your actual image file path) -->
            <img 
                src="https://images.unsplash.com/photo-1523050854058-8df90110c9f1?q=80&w=1000&auto=format&fit=crop" 
                alt="Students Graduating" 
                class="w-full h-full object-cover object-center"
            />
        </div>

    </div>

</body>
</html>
